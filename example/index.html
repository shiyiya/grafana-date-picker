<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrafanaDatePicker Example</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/dayjs@1/plugin/utc.js"></script>
  <script src="https://unpkg.com/dayjs@1/plugin/timezone.js"></script>
  <script src="https://unpkg.com/dayjs@1/plugin/customParseFormat.js"></script>
  <script src="https://unpkg.com/dayjs@1/plugin/relativeTime.js"></script>
  <script src="https://unpkg.com/dayjs@1/plugin/isBetween.js"></script>
  <script src="https://unpkg.com/dayjs@1/plugin/isoWeek.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Mock GrafanaDatePicker component for example
    function GrafanaDatePicker({ value, onChange, placeholder = "选择日期范围" }) {
      const [isOpen, setIsOpen] = useState(false);

      return (
        <div className="relative">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="flex items-center gap-2 px-3 py-2 border rounded-lg bg-white hover:bg-gray-50 transition-colors min-w-[280px] text-left"
          >
            <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span className="flex-1">
              {value ? `${value.from.format('YYYY-MM-DD HH:mm')} — ${value.to.format('YYYY-MM-DD HH:mm')}` : placeholder}
            </span>
            <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          {isOpen && (
            <div className="absolute top-full mt-1 w-[660px] bg-white border rounded-lg shadow-lg z-50 p-6">
              <div className="text-center text-gray-500">
                This is a demo. Install the package to see the full component!
              </div>
              <div className="mt-4">
                <button
                  onClick={() => {
                    const now = dayjs();
                    onChange({
                      from: now.subtract(5, 'day'),
                      to: now
                    });
                    setIsOpen(false);
                  }}
                  className="px-4 py-2 bg-blue-600 text-white rounded"
                >
                  Select Last 5 Days
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [dateRange, setDateRange] = useState(null);

      dayjs.extend(window.dayjs_plugin_utc);
      dayjs.extend(window.dayjs_plugin_timezone);
      dayjs.extend(window.dayjs_plugin_customParseFormat);
      dayjs.extend(window.dayjs_plugin_relativeTime);
      dayjs.extend(window.dayjs_plugin_isBetween);
      dayjs.extend(window.dayjs_plugin_isoWeek);

      return (
        <div className="min-h-screen bg-gray-50 p-8">
          <div className="max-w-4xl mx-auto">
            <h1 className="text-3xl font-bold text-gray-900 mb-8">
              GrafanaDatePicker Demo
            </h1>

            <div className="bg-white rounded-lg shadow p-6">
              <div className="space-y-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Basic Usage
                  </label>
                  <GrafanaDatePicker
                    value={dateRange}
                    onChange={setDateRange}
                  />
                </div>

                {dateRange && (
                  <div className="mt-6 p-4 bg-gray-50 rounded-lg">
                    <h3 className="text-sm font-medium text-gray-700 mb-2">Selected Range:</h3>
                    <div className="font-mono text-sm">
                      <div>From: {dateRange.from.format('YYYY-MM-DD HH:mm:ss')}</div>
                      <div>To: {dateRange.to.format('YYYY-MM-DD HH:mm:ss')}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="mt-8 bg-white rounded-lg shadow p-6">
              <h2 className="text-xl font-semibold mb-4">Installation</h2>
              <pre className="bg-gray-100 p-4 rounded overflow-x-auto">
                <code>npm install grafana-date-picker</code>
              </pre>

              <h2 className="text-xl font-semibold mt-6 mb-4">Usage</h2>
              <pre className="bg-gray-100 p-4 rounded overflow-x-auto">
{`import { GrafanaDatePicker } from 'grafana-date-picker';
import dayjs from 'dayjs';

function App() {
  const [dateRange, setDateRange] = useState(null);

  return (
    <GrafanaDatePicker
      value={dateRange}
      onChange={setDateRange}
      timezone="Asia/Shanghai"
    />
  );
}`}
              </pre>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
